<div class="login-page">
  <div class="login-card">
    <div class="logo">
      <span class="logo-icon">💰</span>
      <h1>Finance OS</h1>
      <p>Gestione finanziaria personale</p>
    </div>

    <h2>{{ mode() === 'login' ? 'Accedi' : 'Registrati' }}</h2>

    @if (error()) {
      <div class="error-banner">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()" #f="ngForm">
      @if (mode() === 'register') {
        <div class="field">
          <label for="name">Nome (opzionale)</label>
          <input id="name" type="text" [(ngModel)]="name" name="name"
                 placeholder="Mario Rossi"
                 autocomplete="name" />
        </div>
      }

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email"
               placeholder="mario@esempio.it"
               required autocomplete="email" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password"
               [placeholder]="mode() === 'register' ? 'Almeno 8 caratteri' : ''"
               required autocomplete="current-password" />
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) { Caricamento... }
        @else { {{ mode() === 'login' ? 'Accedi' : 'Registrati' }} }
      </button>
    </form>

    <p class="toggle-mode">
      {{ mode() === 'login' ? 'Non hai un account?' : 'Hai già un account?' }}
      <button type="button" (click)="toggleMode()">
        {{ mode() === 'login' ? 'Registrati' : 'Accedi' }}
      </button>
    </p>
  </div>
</div>
