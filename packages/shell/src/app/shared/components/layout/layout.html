<div class="platform">

  <nav class="sidebar">
    <div class="sidebar-top">
      <a class="brand" routerLink="/">
        <span class="brand-mark">◈</span>
        <span class="brand-name">LifeOS</span>
      </a>
    </div>

    <div class="sidebar-modules">
      @for (mod of modules; track mod.id) {
        <div class="module-group">
          <div class="module-label">
            <span class="module-icon" [style.color]="mod.color">{{ mod.icon }}</span>
            {{ mod.label }}
          </div>
          @for (item of mod.navItems; track item.route) {
            <a class="nav-item"
               [routerLink]="item.route"
               routerLinkActive="active"
               [routerLinkActiveOptions]="{ exact: item.route === mod.route }">
              <span class="nav-icon">{{ item.icon }}</span>
              {{ item.label }}
            </a>
          }
        </div>
      }
    </div>

    <div class="sidebar-bottom">
      <a class="nav-item" routerLink="/settings" routerLinkActive="active">
        <span class="nav-icon">⚙</span>
        Impostazioni
      </a>
      <button class="nav-item logout" (click)="logout()">
        <span class="nav-icon">→</span>
        {{ user()?.name ?? user()?.email }}
      </button>
    </div>
  </nav>

  <main class="content">
    <router-outlet />
  </main>

</div>

<!-- Toast notifications -->
<div class="toast-container">
  @for (t of toast.toasts(); track t.id) {
    <div class="toast" [class.toast-ok]="t.type === 'ok'" [class.toast-error]="t.type === 'error'">
      <span class="toast-icon">{{ t.type === 'ok' ? '✓' : '✕' }}</span>
      {{ t.message }}
    </div>
  }
</div>

<style>
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 9999;
  }
  .toast {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    animation: slide-in 0.2s ease;
    max-width: 320px;
  }
  .toast-ok    { background: #14532d; color: #4ade80; border: 1px solid #166534; }
  .toast-error { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }
  .toast-icon  { font-size: 12px; flex-shrink: 0; }
  @keyframes slide-in {
    from { transform: translateX(100%); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }
</style>
