app = 'lifeos-platform-api'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile.api'

[env]
  NODE_ENV = 'production'
  PORT = '3000'
  DB_PATH = '/data/platform.db'
  FINANCE_DB_PATH = '/data/finance.db'
  LIFE_DB_PATH = '/data/life.db'

[mounts]
  source = 'lifeos_data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 3000

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
