server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy API verso il backend
  location /api/ {
    proxy_pass https://lifeos-platform-api.fly.dev/api/;
    proxy_set_header Host lifeos-platform-api.fly.dev;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_ssl_server_name on;
  }

  # Angular routing — tutte le route vanno a index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache assets statici
  location ~* \.(js|css|png|jpg|ico|svg)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
