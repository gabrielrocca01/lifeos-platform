version: '3.8'
services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    ports:
      - "3000:3000"
    volumes:
      - ../data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=http://localhost:4200
      - NODE_ENV=production
    restart: unless-stopped

  shell:
    build:
      context: ..
      dockerfile: infra/Dockerfile.shell
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped
